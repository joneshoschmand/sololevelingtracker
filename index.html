<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#05060d">
<title>Solo Leveling — System Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: #05060d;
  color: #e2e8f0;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  font-size: 15px;
  line-height: 1.5;
}
button { background: none; border: none; cursor: pointer; font-family: inherit; color: inherit; font-size: inherit; }
input, textarea, select { font-family: inherit; outline: none; font-size: inherit; color: inherit; background: transparent; border: none; width: 100%; }
input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
::selection { background: rgba(251,191,36,0.3); color: #fff; }
svg { display: inline-block; vertical-align: middle; flex-shrink: 0; }

/* === FONTS === */
.font-display { font-family: 'Cinzel', serif; letter-spacing: 0.02em; }
.font-mono { font-family: 'JetBrains Mono', monospace; }

/* === BACKGROUND ATMOSPHERE === */
.cosmic-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
.grid-bg {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(180,160,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,160,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.5;
}
.aura-blob {
  position: absolute; border-radius: 50%; filter: blur(40px);
}
.aura-blob.tl { top: -160px; left: -160px; width: 600px; height: 600px; }
.aura-blob.br { bottom: -160px; right: -160px; width: 500px; height: 500px; filter: blur(50px); }
.aura-blob.purple {
  top: 33%; right: 25%; width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, transparent 70%);
  filter: blur(30px); opacity: 0.6;
}

/* === LAYOUT === */
.container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
@media (max-width: 640px) { .container { padding: 0 1rem; } }

/* === HEADER === */
.header {
  position: relative; z-index: 20;
  border-bottom: 1px solid rgba(245,158,11,0.1);
  backdrop-filter: blur(16px);
  background: rgba(2,6,23,0.4);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  padding: 1rem 0;
}
.brand { display: flex; align-items: center; gap: 0.75rem; }
.brand-icon {
  position: relative; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
}
.brand-icon::before {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  animation: kiPulse 2.5s ease-in-out infinite;
}
.brand-text { line-height: 1.2; }
.brand-title {
  font-family: 'Cinzel', serif; font-size: 1.125rem; font-weight: 700;
  letter-spacing: 0.1em;
}
@media (min-width: 640px) { .brand-title { font-size: 1.25rem; } }
.brand-sub {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.3em; color: #94a3b8;
}
.header-right { display: flex; align-items: center; gap: 0.5rem; }
.pwr-pill {
  display: none; align-items: center; gap: 0.75rem;
  padding: 0.5rem 1rem; border-radius: 6px;
  border: 1px solid rgba(245,158,11,0.2);
  background: rgba(2,6,23,0.6);
}
@media (min-width: 640px) { .pwr-pill { display: flex; } }
.pwr-pill-label {
  font-size: 0.75rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: #64748b;
}

/* === SYNC BADGE === */
.sync-badge {
  display: flex; align-items: center; gap: 0.375rem;
  padding: 0.375rem 0.625rem; border-radius: 6px;
  border: 1px solid; background: rgba(2,6,23,0.6);
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; }
.sync-dot.pulse { animation: kiPulse 2.5s ease-in-out infinite; }
.sync-text {
  display: none; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em;
}
@media (min-width: 640px) { .sync-text { display: inline; } }

/* === NAV === */
.nav {
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(16px);
  background: rgba(2,6,23,0.7);
  border-bottom: 1px solid rgba(30,41,59,0.5);
}
.nav-inner {
  display: flex; gap: 0.25rem;
  overflow-x: auto;
  scrollbar-width: thin;
}
.nav-inner::-webkit-scrollbar { height: 0; }
.nav-btn {
  position: relative;
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.875rem 1rem;
  font-family: 'Cinzel', serif; font-size: 0.875rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.15em;
  color: #64748b; white-space: nowrap;
  transition: color 0.2s;
}
.nav-btn:hover { color: #cbd5e1; }
.nav-btn.active { color: #fcd34d; }
.nav-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 0.5rem; right: 0.5rem;
  height: 2px;
  background: linear-gradient(90deg, transparent, #fbbf24, transparent);
  box-shadow: 0 0 10px rgba(251,191,36,0.8);
}
.nav-label { display: none; }
@media (min-width: 640px) { .nav-label { display: inline; } }

/* === MAIN === */
.main {
  position: relative; z-index: 1;
  max-width: 1280px; margin: 0 auto;
  padding: 1.5rem;
}
@media (min-width: 640px) { .main { padding: 2.5rem 1.5rem; } }

/* === CARDS === */
.card {
  border-radius: 8px;
  border: 1px solid rgba(30,41,59,1);
  background: rgba(2,6,23,0.6);
  backdrop-filter: blur(4px);
  padding: 1.25rem;
}

/* === HERO RANK CARD === */
.hero-card {
  position: relative; overflow: hidden;
  border-radius: 8px;
  border: 1px solid rgba(30,41,59,0.8);
  background: linear-gradient(135deg, #020617, #020617, #0f172a);
  padding: 1.5rem;
}
@media (min-width: 640px) { .hero-card { padding: 2.5rem; } }
.hero-blob-1 {
  position: absolute; top: -8rem; right: -8rem;
  width: 24rem; height: 24rem; border-radius: 50%;
  animation: kiPulse 2s ease-in-out infinite;
}
.hero-blob-2 {
  position: absolute; bottom: -5rem; left: -5rem;
  width: 18rem; height: 18rem; border-radius: 50%;
  filter: blur(20px); opacity: 0.5;
}
.hero-grid {
  position: relative; display: grid; gap: 2rem;
  grid-template-columns: 1fr; align-items: center;
}
@media (min-width: 768px) { .hero-grid { grid-template-columns: auto 1fr; } }
.hero-orb {
  position: relative; width: 12rem; height: 12rem;
  margin: 0 auto;
}
@media (min-width: 768px) { .hero-orb { margin: 0; } }
.orb-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px dashed; animation: ringSpin 20s linear infinite;
}
.orb-aura {
  position: absolute; inset: 1rem; border-radius: 50%;
  animation: kiPulse 2s ease-in-out infinite;
}
.orb-core {
  position: absolute; inset: 2rem; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid; backdrop-filter: blur(4px);
}
.orb-tier {
  font-family: 'Cinzel', serif; font-size: 3rem; font-weight: 900;
  text-align: center;
}
.orb-tier-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.3em; color: #94a3b8;
  margin-top: 0.25rem; text-align: center;
}
.hero-info { text-align: center; }
@media (min-width: 768px) { .hero-info { text-align: left; } }
.hero-form-label {
  font-size: 0.75rem; text-transform: uppercase;
  letter-spacing: 0.4em; color: #64748b;
  margin-bottom: 0.5rem;
}
.hero-rank-name {
  font-family: 'Cinzel', serif;
  font-size: 1.875rem; font-weight: 900;
  margin-bottom: 0.75rem; line-height: 1.1;
}
@media (min-width: 640px) { .hero-rank-name { font-size: 3rem; } }
.hero-rank-desc {
  font-style: italic; color: #94a3b8;
  margin-bottom: 1.5rem;
  font-size: 0.875rem;
}
@media (min-width: 640px) { .hero-rank-desc { font-size: 1rem; } }
.energy-bar-wrap { display: flex; flex-direction: column; gap: 0.5rem; }
.energy-labels {
  display: flex; justify-content: space-between;
  font-size: 0.75rem; text-transform: uppercase;
  letter-spacing: 0.15em;
}
.energy-bar {
  position: relative; height: 16px; border-radius: 2px;
  overflow: hidden; border: 1px solid #334155;
  background: rgba(0,0,0,0.6);
}
.energy-bar-fill {
  position: absolute; inset-block: 0; left: 0;
  transition: width 0.7s;
  background-size: 200% 100%;
  animation: shimmer 3s linear infinite;
}
.energy-bar-pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.15em; mix-blend-mode: overlay;
}

/* === STAT GRID === */
.stat-grid {
  display: grid; gap: 0.75rem;
  grid-template-columns: repeat(2, 1fr);
}
@media (min-width: 1024px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
.stat-card {
  position: relative; overflow: hidden;
  border-radius: 8px;
  border: 1px solid rgba(30,41,59,1);
  background: rgba(2,6,23,0.6);
  backdrop-filter: blur(4px);
  padding: 1rem;
}
.stat-card-blob {
  position: absolute; top: 0; right: 0;
  width: 6rem; height: 6rem; border-radius: 50%;
  opacity: 0.2;
}
.stat-card-head {
  position: relative; display: flex;
  justify-content: space-between; align-items: center;
  margin-bottom: 0.5rem;
}
.stat-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.3em; color: #94a3b8;
}
.stat-value {
  position: relative;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.5rem; font-weight: 700;
}

/* === SECTIONS === */
.section-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 0.75rem;
  margin-bottom: 1rem;
}
.section-icon {
  width: 32px; height: 32px; border-radius: 4px;
  background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.2);
  display: flex; align-items: center; justify-content: center;
  color: #fcd34d; flex-shrink: 0;
}
.section-title {
  font-family: 'Cinzel', serif; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: #fef3c7;
}
.section-sub {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.15em; color: #64748b;
  margin-top: 0.125rem;
}
.section-action {
  display: flex; align-items: center; gap: 0.25rem;
  font-size: 0.75rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: #fcd34d;
  transition: color 0.2s;
}
.section-action:hover { color: #fde68a; }

/* === BARS === */
.bar-row { margin-bottom: 0.75rem; }
.bar-row:last-child { margin-bottom: 0; }
.bar-label {
  display: flex; justify-content: space-between;
  font-size: 0.75rem; margin-bottom: 0.25rem; color: #cbd5e1;
}
.bar { height: 8px; border-radius: 2px; background: #0f172a; overflow: hidden; }
.bar-fill { height: 100%; transition: width 0.5s; }

/* === BUTTONS === */
.btn {
  display: inline-flex; align-items: center; gap: 0.375rem;
  padding: 0.5rem 1rem; border-radius: 4px;
  border: 1px solid;
  font-family: 'Cinzel', serif; font-weight: 600;
  font-size: 0.75rem; text-transform: uppercase;
  letter-spacing: 0.15em;
  transition: background 0.2s, border-color 0.2s;
}
.btn-amber {
  background: rgba(245,158,11,0.1);
  border-color: rgba(245,158,11,0.3);
  color: #fcd34d;
}
.btn-amber:hover { background: rgba(245,158,11,0.2); }
.btn-cyan {
  background: rgba(6,182,212,0.1);
  border-color: rgba(6,182,212,0.3);
  color: #67e8f9;
}
.btn-cyan:hover { background: rgba(6,182,212,0.2); }
.btn-red {
  background: rgba(239,68,68,0.1);
  border-color: rgba(239,68,68,0.3);
  color: #fca5a5;
}
.btn-red:hover { background: rgba(239,68,68,0.2); }

/* === INPUTS === */
.input, .textarea, .select {
  width: 100%;
  background: #020617;
  border: 1px solid #334155;
  border-radius: 4px;
  padding: 0.5rem 0.75rem;
  color: #e2e8f0;
  transition: border-color 0.2s;
}
.input:focus, .textarea:focus, .select:focus { border-color: rgba(245,158,11,0.5); }
.input::placeholder, .textarea::placeholder { color: #475569; }
.input.mono, .textarea.mono { font-family: 'JetBrains Mono', monospace; }
.input.lg { padding: 0.75rem 1rem; font-size: 1.125rem; }

/* === PRAYER GRID === */
.prayer-grid {
  display: grid; gap: 0.75rem;
  grid-template-columns: repeat(2, 1fr);
}
@media (min-width: 640px) { .prayer-grid { grid-template-columns: repeat(5, 1fr); } }
.prayer-btn {
  position: relative;
  padding: 1rem;
  border-radius: 8px;
  border: 1px solid #1e293b;
  background: rgba(2,6,23,0.4);
  transition: all 0.2s;
  text-align: center;
}
.prayer-btn:hover { border-color: #334155; }
.prayer-btn.done {
  border-color: rgba(251,191,36,0.6);
  background: rgba(245,158,11,0.05);
  box-shadow: inset 0 0 20px rgba(251,191,36,0.15), 0 0 20px rgba(251,191,36,0.2);
}
.prayer-btn.missed {
  border-color: rgba(239,68,68,0.4);
  background: rgba(127,29,29,0.2);
}
.prayer-btn-icon { margin: 0 auto 0.5rem; display: flex; justify-content: center; }
.prayer-btn-icon.done { color: #fcd34d; filter: drop-shadow(0 0 8px rgba(251,191,36,0.8)); }
.prayer-btn-icon.missed { color: #f87171; }
.prayer-btn-icon.pending { color: #64748b; }
.prayer-btn-name {
  font-family: 'Cinzel', serif; font-size: 0.875rem; font-weight: 700;
}
.prayer-btn.done .prayer-btn-name { color: #fde68a; }
.prayer-btn.missed .prayer-btn-name { color: #fca5a5; }
.prayer-btn.pending .prayer-btn-name { color: #94a3b8; }
.prayer-btn-time {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.15em; color: #64748b; margin-top: 0.125rem;
}
.prayer-btn-marker {
  position: absolute; top: 4px; right: 4px;
}

/* === TOGGLE BIG === */
.toggle-grid {
  display: grid; gap: 0.75rem;
  grid-template-columns: repeat(3, 1fr);
}
.toggle-big {
  position: relative;
  padding: 1rem;
  border-radius: 8px;
  border: 1px solid #1e293b;
  background: rgba(2,6,23,0.4);
  transition: all 0.2s;
  text-align: center;
}
.toggle-big:hover { border-color: #334155; }
.toggle-big.active { background: rgba(255,255,255,0.02); }
.toggle-big-icon { margin: 0 auto 0.25rem; display: flex; justify-content: center; }
.toggle-big-label {
  font-family: 'Cinzel', serif; font-size: 0.875rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.15em;
}

/* === PRAYER PATH (RANK LADDER) === */
.rank-row {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.5rem; border-radius: 4px;
  transition: background 0.2s;
}
.rank-row:hover { background: rgba(15,23,42,0.4); }
.rank-row.current {
  background: rgba(2,6,23,0.8);
  border: 1px solid rgba(245,158,11,0.2);
}
.rank-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem; color: #475569;
  width: 24px; text-align: right;
}
.rank-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rank-name-cell { flex: 1; min-width: 0; }
.rank-name {
  font-family: 'Cinzel', serif; font-size: 0.875rem;
  font-weight: 600; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}
.rank-name.locked { color: #475569; }
.rank-threshold {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem; color: #64748b;
}
.rank-tag {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.15em; font-weight: 700;
  padding: 0.125rem 0.5rem; border-radius: 4px;
}

/* === GOALS === */
.goal-card { padding: 1.25rem; }
.goal-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.goal-title {
  font-family: 'Cinzel', serif; font-size: 1.125rem;
  font-weight: 700; color: #fef3c7;
}
.goal-meta {
  font-size: 0.75rem; color: #94a3b8; margin-top: 0.125rem;
}
.goal-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.5rem; font-weight: 700;
}
.milestone-row {
  display: flex; align-items: center; gap: 0.5rem;
  margin-bottom: 0.25rem;
}
.milestone-row .ms-del { opacity: 0; transition: opacity 0.2s; }
.milestone-row:hover .ms-del { opacity: 1; }
.milestone-check {
  width: 20px; height: 20px;
  border: 2px solid #334155;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.milestone-check:hover { border-color: #64748b; }
.milestone-check.done {
  border-color: #10b981;
  background: rgba(16,185,129,0.2);
  color: #34d399;
}
.milestone-text { flex: 1; font-size: 0.875rem; color: #e2e8f0; }
.milestone-text.done { text-decoration: line-through; color: #64748b; }

/* === NOTES === */
.notes-grid {
  display: grid; gap: 1rem;
  grid-template-columns: 1fr;
}
@media (min-width: 1024px) {
  .notes-grid { grid-template-columns: 3fr 3fr 6fr; }
}
.notes-folder {
  display: flex; align-items: center;
  border-radius: 4px; transition: background 0.2s;
}
.notes-folder.active { background: rgba(245,158,11,0.1); }
.notes-folder:hover { background: rgba(15,23,42,0.5); }
.notes-folder-btn {
  flex: 1; display: flex; align-items: center; gap: 0.5rem;
  padding: 0.5rem; min-width: 0; text-align: left;
}
.notes-folder-actions {
  display: flex; padding-right: 0.25rem;
  opacity: 0; transition: opacity 0.2s;
}
.notes-folder:hover .notes-folder-actions { opacity: 1; }
.notes-folder-actions button { padding: 0.25rem; color: #64748b; transition: color 0.2s; }
.notes-folder-actions button:hover { color: #fcd34d; }
.note-item {
  width: 100%; text-align: left;
  padding: 0.5rem; border-radius: 4px;
  border: 1px solid transparent;
  transition: all 0.2s;
  display: block;
}
.note-item:hover {
  background: rgba(15,23,42,0.6);
}
.note-item.active {
  background: rgba(245,158,11,0.1);
  border-color: rgba(245,158,11,0.3);
}
.note-item-title {
  display: flex; align-items: center; gap: 0.375rem;
  font-size: 0.875rem; color: #e2e8f0; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.note-item-preview {
  font-size: 11px; color: #64748b;
  margin-top: 0.125rem; margin-left: 1rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* === DIARY ARCHIVE === */
.diary-grid {
  display: grid; gap: 1rem;
  grid-template-columns: 1fr;
}
@media (min-width: 1024px) { .diary-grid { grid-template-columns: 2fr 1fr; } }
.archive-item {
  width: 100%; text-align: left;
  padding: 0.75rem; border-radius: 4px;
  border: 1px solid #1e293b;
  transition: all 0.2s;
  margin-bottom: 0.5rem;
  display: block;
}
.archive-item:hover { border-color: #334155; background: rgba(15,23,42,0.5); }
.archive-item.active {
  border-color: rgba(245,158,11,0.3);
  background: rgba(245,158,11,0.05);
}
.archive-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem; color: #fcd34d;
  margin-bottom: 0.25rem;
}
.archive-preview {
  font-size: 0.75rem; color: #94a3b8;
  display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* === SEARCH === */
.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 0.625rem; top: 50%;
  transform: translateY(-50%); color: #64748b;
}
.search-input {
  padding-left: 2.25rem;
}

/* === ANIMATIONS === */
@keyframes kiPulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }

  from { transform: rotate(0deg); }

}

@keyframes spark {
  0% { transform: translateY(0) scale(1); opacity: 1; }

}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes spin {
  to { transform: rotate(360deg); }

.anim-fade-in { animation: fadeIn 0.5s ease-out both; }
.anim-slide-up { animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }

// ============= HELPERS =============
const todayKey = () => new Date().toISOString().slice(0, 10);
const fmtDate = d => new Date(d + "T00:00").toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
const fmtLong = d => new Date(d + "T00:00").toLocaleDateString(undefined, { weekday: "long", year: "numeric", month: "long", day: "numeric" });
const yearOf = d => d.slice(0, 4);
const monthOf = d => d.slice(0, 7);
function weekKey(d) {
  const dt = new Date(d + "T00:00");
  const day = dt.getDay() || 7;
  dt.setDate(dt.getDate() - day + 1);
  return dt.toISOString().slice(0, 10);
}
const uid = () => Math.random().toString(36).slice(2, 10);
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function computeDayPoints(day, settings) {
  if (!day) return 0;
  let pts = 0;
  PRAYERS.forEach(p => {
    if (day.prayers && day.prayers[p.id] === true) pts += settings.points.prayer.gain;
    else if (day.prayers && day.prayers[p.id] === false) pts -= settings.points.prayer.loss;
  });
  if (day.workout === true) pts += settings.points.workout.gain;
  else if (day.workout === false) pts -= settings.points.workout.loss;
  if (typeof day.calories === "number" && day.calories > 0) {
    if (day.calories <= settings.calorieLimit) pts += settings.points.calorie.gain;
    else pts -= settings.points.calorie.loss;
  }
  pts += (day.workHours || 0) * settings.points.workHour;
  pts += (day.workTasks || 0) * settings.points.workTask;
  (settings.customHabits || []).forEach(h => {
    const v = day.customHabits && day.customHabits[h.id];
    if (v === true) pts += settings.points.customHabit.gain;
    else if (v === false) pts -= settings.points.customHabit.loss;
  });
  return pts;
}

function getRank(total) {
  let idx = 0;
  for (let i = 0; i < RANKS.length; i++) if (total >= RANKS[i].threshold) idx = i;
  return { rank: RANKS[idx], index: idx, next: RANKS[idx + 1] || null };
}

let state = {
  days: {},
  diary: {},
  goals: [],
  folders: [],
  settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS)),
};
let currentView = "dashboard";
let habitsDate = todayKey();
let diaryDate = todayKey();
let diarySearch = "";
let goalsYear = new Date().getFullYear();
let activeFolderId = null;
let activeNoteId = null;
let noteSearch = "";
let syncStatus = "loading";
let levelUpRank = null;
let prevRankIdx = null;
let saveTimer = null;

function getTotals() {
  const today = todayKey();
  const tWeek = weekKey(today);
  const tMonth = monthOf(today);
  const tYear = yearOf(today);
  let total = 0, todayPts = 0, weekPts = 0, monthPts = 0, yearPts = 0;
  for (const d in state.days) {
    const p = computeDayPoints(state.days[d], state.settings);
    total += p;
    if (d === today) todayPts = p;
    if (weekKey(d) === tWeek) weekPts += p;
    if (monthOf(d) === tMonth) monthPts += p;
    if (yearOf(d) === tYear) yearPts += p;
  }
  const milestoneBonus = state.goals.reduce((acc, g) => acc + g.milestones.filter(m => m.done).length * state.settings.points.milestone, 0);
  total += milestoneBonus;
  yearPts += state.goals.filter(g => String(g.year) === tYear).reduce((a, g) => a + g.milestones.filter(m => m.done).length * state.settings.points.milestone, 0);
  return { total, todayPts, weekPts, monthPts, yearPts };
}

function getStreak() {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const k = d.toISOString().slice(0, 10);
    const day = state.days[k];
    const all = day && PRAYERS.every(p => day.prayers && day.prayers[p.id] === true);
    if (all) streak++;
    else if (i > 0) break;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

// ============= COMMIT / SYNC =============
function commitChange() {
  syncStatus = "saving";
  renderSyncBadge();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await sbSave(state);
      syncStatus = "synced";
    } catch (e) {
      console.error("Save error:", e);
      syncStatus = "error";
    }
    renderSyncBadge();
  }, 1000);
  // Level up detection
  const r = getRank(getTotals().total);
  if (prevRankIdx !== null && r.index > prevRankIdx) {
    levelUpRank = r.rank;
    renderModal();
  }
  prevRankIdx = r.index;
}

// ============= ACTIONS (global namespace) =============
window.app = {
  setView(v) {
    currentView = v;
    renderNav();
    renderView();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  },
  setHabitsDate(v) { habitsDate = v; commitChange(); renderView(); renderHeader(); },
  togglePrayer(id) {
    const d = state.days[habitsDate] || {};
    const cur = d.prayers && d.prayers[id];
    const next = cur === true ? false : cur === false ? null : true;
    const np = Object.assign({}, d.prayers || {});
    if (next === null) delete np[id]; else np[id] = next;
    state.days[habitsDate] = Object.assign({}, d, { prayers: np });
    commitChange(); renderView(); renderHeader();
  },
  setWorkout(val) {
    const d = state.days[habitsDate] || {};
    state.days[habitsDate] = Object.assign({}, d, { workout: val });
    commitChange(); renderView(); renderHeader();
  },
  setCalories(v) {
    const d = state.days[habitsDate] || {};
    state.days[habitsDate] = Object.assign({}, d, { calories: parseInt(v) || 0 });
    commitChange(); renderHeader();
    renderCalorieBar();
  },
  setWorkHours(v) {
    const d = state.days[habitsDate] || {};
    state.days[habitsDate] = Object.assign({}, d, { workHours: parseFloat(v) || 0 });
    commitChange(); renderHeader(); renderHabitsHeader();
  },
  setWorkTasks(v) {
    const d = state.days[habitsDate] || {};
    state.days[habitsDate] = Object.assign({}, d, { workTasks: parseInt(v) || 0 });
    commitChange(); renderHeader(); renderHabitsHeader();
  },
  toggleCustom(hid) {
    const d = state.days[habitsDate] || {};
    const cur = d.customHabits && d.customHabits[hid];
    const next = cur === true ? false : cur === false ? null : true;
    const nh = Object.assign({}, d.customHabits || {});
    if (next === null) delete nh[hid]; else nh[hid] = next;
    state.days[habitsDate] = Object.assign({}, d, { customHabits: nh });
    commitChange(); renderView(); renderHeader();
  },
  addCustom() {
    const name = prompt("New habit name:");
    if (!name || !name.trim()) return;
    state.settings.customHabits = (state.settings.customHabits || []).concat([{ id: uid(), name: name.trim() }]);
    commitChange(); renderView();
  },
  removeCustom(hid) {
    if (!confirm("Remove this habit? Past records remain.")) return;
    state.settings.customHabits = state.settings.customHabits.filter(h => h.id !== hid);
    commitChange(); renderView();
  },
  // Diary
  setDiaryDate(v) { diaryDate = v; renderView(); },
  setDiaryEntry(v) { state.diary[diaryDate] = v; commitChange(); /* don't re-render textarea */ },
  setDiarySearch(v) { diarySearch = v; renderDiaryArchive(); },
  // Goals
  setGoalsYear(v) { goalsYear = parseInt(v); renderView(); },
  addGoal(title) {
    if (!title || !title.trim()) return;
    state.goals.push({ id: uid(), title: title.trim(), year: goalsYear, milestones: [] });
    commitChange(); renderView(); renderHeader();
  },
  removeGoal(gid) {
    if (!confirm("Delete this quest?")) return;
    state.goals = state.goals.filter(g => g.id !== gid);
    commitChange(); renderView(); renderHeader();
  },
  addMilestone(gid) {
    const t = prompt("New milestone:");
    if (!t || !t.trim()) return;
    const g = state.goals.find(x => x.id === gid);
    if (!g) return;
    g.milestones.push({ id: uid(), title: t.trim(), done: false });
    commitChange(); renderView();
  },
  toggleMilestone(gid, mid) {
    const g = state.goals.find(x => x.id === gid);
    if (!g) return;
    const m = g.milestones.find(x => x.id === mid);
    if (!m) return;
    m.done = !m.done;
    commitChange(); renderView(); renderHeader();
  },
  removeMilestone(gid, mid) {
    const g = state.goals.find(x => x.id === gid);
    if (!g) return;
    g.milestones = g.milestones.filter(m => m.id !== mid);
    commitChange(); renderView();
  },
  // Notes
  addFolder() {
    const name = prompt("Organization / Project name:");
    if (!name || !name.trim()) return;
    const f = { id: uid(), name: name.trim(), notes: [] };
    state.folders.push(f);
    activeFolderId = f.id; activeNoteId = null;
    commitChange(); renderView();
  },
  selectFolder(fid) { activeFolderId = fid; activeNoteId = null; renderView(); },
  renameFolder(fid) {
    const f = state.folders.find(x => x.id === fid);
    if (!f) return;
    const name = prompt("Rename folder:", f.name);
    if (!name || !name.trim()) return;
    f.name = name.trim();
    commitChange(); renderView();
  },
  removeFolder(fid) {
    if (!confirm("Delete folder and all its notes?")) return;
    state.folders = state.folders.filter(f => f.id !== fid);
    if (activeFolderId === fid) { activeFolderId = null; activeNoteId = null; }
    commitChange(); renderView();
  },
  addNote() {
    const f = state.folders.find(x => x.id === activeFolderId);
    if (!f) return;
    const n = { id: uid(), title: "Untitled", content: "", updated: Date.now() };
    f.notes.unshift(n);
    activeNoteId = n.id;
    commitChange(); renderView();
  },
  selectNote(nid) { activeNoteId = nid; renderView(); },
  setNoteSearch(v) { noteSearch = v; renderNotesList(); },
  setNoteTitle(v) {
    const f = state.folders.find(x => x.id === activeFolderId);
    if (!f) return;
    const n = f.notes.find(x => x.id === activeNoteId);
    if (!n) return;
    n.title = v; n.updated = Date.now(); commitChange();
  },
  setNoteContent(v) {
    const f = state.folders.find(x => x.id === activeFolderId);
    if (!f) return;
    const n = f.notes.find(x => x.id === activeNoteId);
    if (!n) return;
    n.content = v; n.updated = Date.now(); commitChange();
  },
  removeNote(nid) {
    if (!confirm("Delete note?")) return;
    const f = state.folders.find(x => x.id === activeFolderId);
    if (!f) return;
    f.notes = f.notes.filter(n => n.id !== nid);
    if (activeNoteId === nid) activeNoteId = null;
    commitChange(); renderView();
  },
  // Settings
  setSettingNum(path, v) {
    const keys = path.split(".");
    let obj = state.settings;
    for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
    obj[keys[keys.length - 1]] = parseFloat(v) || 0;
    commitChange(); renderHeader();
  },
  exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "solo-leveling-" + todayKey() + ".json"; a.click();
    URL.revokeObjectURL(url);
  },
  resetAll: async () => {
    if (!confirm("Wipe ALL data from cloud? This cannot be undone.")) return;
    state = { days: {}, diary: {}, goals: [], folders: [], settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS)) };
    activeFolderId = null; activeNoteId = null;
    try { await sbDelete(); } catch (e) { console.error(e); }
    syncStatus = "synced"; renderSyncBadge();
    renderHeader(); renderView();
  },
  closeLevelUp() { levelUpRank = null; renderModal(); },
};

      '<div class="flex items-center gap-2 mb-4"><span class="text-amber-400">' + icon('award', 16) + '</span><h2 class="font-display tracking-widest uppercase text-sm text-amber-200">Path of Ascension · ' + thisYear + '</h2></div>' +
      '<div>' + RANKS.map((rk, i) => {
        const reached = totals.total >= rk.threshold;
        const current = i === ri.index;
        return '<div class="rank-row' + (current ? ' current' : '') + '">' +
          '<div class="rank-num">' + String(i + 1).padStart(2, '0') + '</div>' +
          '<div class="rank-dot" style="background:' + (reached ? rk.color : '#1e293b') + ';box-shadow:' + (reached ? '0 0 8px ' + rk.glow : 'none') + '"></div>' +
          '<div class="rank-name-cell">' +
            '<div class="rank-name' + (reached ? '' : ' locked') + '" style="' + (reached ? 'color:' + rk.color : '') + '">' + escapeHtml(rk.name) + '</div>' +
          '</div>' +
          '<div class="rank-threshold">' + rk.threshold.toLocaleString() + '</div>' +
          (current ? '<span class="rank-tag" style="background:' + rk.color + '20;color:' + rk.color + '">You</span>' :
            (reached ? '<span class="text-emerald-400" style="opacity:0.7">' + icon('check', 12) + '</span>' : '')) +
        '</div>';
      }).join('') + '</div>' +
    '</div>';

  // YEARLY GOALS
  if (yearGoals.length > 0) {
    html +=
      '<div class="card">' +
        '<div class="flex items-center gap-2 mb-4"><span class="text-purple-400">' + icon('target', 16) + '</span><h2 class="font-display tracking-widest uppercase text-sm text-amber-200">Active Quests · ' + thisYear + '</h2></div>' +
        '<div class="grid-2">' + yearGoals.slice(0, 4).map(g => {
          const done = g.milestones.filter(m => m.done).length;
          const pct = g.milestones.length ? (done / g.milestones.length) * 100 : 0;
          return '<div style="border:1px solid #1e293b;border-radius:4px;padding:0.75rem;background:rgba(2,6,23,0.5)">' +
            '<div class="flex justify-between items-start mb-2">' +
              '<div class="font-display font-semibold text-sm flex-1 line-clamp-1" style="margin-right:0.5rem">' + escapeHtml(g.title) + '</div>' +
              '<div class="font-mono text-xs text-purple-400">' + pct.toFixed(0) + '%</div>' +
            '</div>' +
            '<div style="height:6px;background:#1e293b;border-radius:2px;overflow:hidden">' +
              '<div style="height:100%;background:linear-gradient(90deg, #a855f7, #ec4899);width:' + pct + '%;box-shadow:0 0 8px rgba(168,85,247,0.6);transition:width 0.5s"></div>' +
            '</div>' +
            '<div class="text-xs text-slate-500 mt-1">' + done + ' / ' + g.milestones.length + ' milestones</div>' +
          '</div>';
        }).join('') + '</div>' +
      '</div>';
  }

  html += '</div>';
  return html;
}

function statCard(label, value, color, ic) {
  return '<div class="stat-card">' +
    '<div class="stat-card-blob" style="background:radial-gradient(circle, ' + color + ' 0%, transparent 70%)"></div>' +
    '<div class="stat-card-head">' +
      '<span class="stat-label">' + label + '</span>' +
      '<span style="color:' + color + '">' + icon(ic, 14) + '</span>' +
    '</div>' +
    '<div class="stat-value" style="color:' + color + ';text-shadow:0 0 20px ' + color + '40">' + (value >= 0 ? '+' : '') + value.toLocaleString() + '</div>' +
  '</div>';
}

function bar(label, value, max, color) {
  const pct = max > 0 ? Math.min(100, (value / max) * 100) : 0;
  return '<div class="bar-row">' +
    '<div class="bar-label"><span>' + escapeHtml(label) + '</span></div>' +
    '<div class="bar"><div class="bar-fill" style="width:' + pct + '%;background:linear-gradient(90deg, ' + color + '99, ' + color + ');box-shadow:0 0 10px ' + color + '80"></div></div>' +
  '</div>';
}

// ----- Habits -----
function renderHabits() {
  const day = state.days[habitsDate] || {};
  const points = computeDayPoints(day, state.settings);

  let html = '<div class="space-y-6 anim-fade-in">';
  html +=
    '<div class="flex" style="flex-direction:column;gap:1rem;align-items:flex-start">' +
      '<div style="flex:1">' +
        '<h1 class="font-display text-3xl font-black tracking-wide text-amber-100" style="font-size:2.25rem">Daily Training</h1>' +
        '<p class="text-slate-400 text-sm mt-1">' + escapeHtml(fmtLong(habitsDate)) + '</p>' +
      '</div>' +
      '<div class="flex items-center gap-3" id="habits-meta">' +
        '<input type="date" value="' + habitsDate + '" oninput="app.setHabitsDate(this.value)" class="input mono" style="width:auto;padding:0.5rem 0.75rem;font-size:0.875rem">' +
        '<div id="habits-pwr" style="padding:0.5rem 1rem;border:1px solid ' + (points >= 0 ? 'rgba(251,191,36,0.3)' : 'rgba(239,68,68,0.3)') + ';border-radius:4px;font-family:JetBrains Mono,monospace;font-size:0.875rem;font-weight:700;color:' + (points >= 0 ? '#fbbf24' : '#ef4444') + ';background:rgba(0,0,0,0.4);text-shadow:0 0 10px ' + (points >= 0 ? 'rgba(251,191,36,0.5)' : 'rgba(239,68,68,0.5)') + '">' +
          (points >= 0 ? '+' : '') + points + ' PWR' +
        '</div>' +
      '</div>' +
    '</div>';

  // Prayers
  html += sectionWrap('sun', 'Salah · Five Pillars', state.settings.points.prayer.gain + ' / -' + state.settings.points.prayer.loss + ' per prayer',
    '<div class="prayer-grid">' + PRAYERS.map(p => {
      const st = day.prayers && day.prayers[p.id];
      const cls = st === true ? 'done' : st === false ? 'missed' : 'pending';
      return '<button class="prayer-btn ' + cls + '" onclick="app.togglePrayer(\'' + p.id + '\')">' +
        '<div class="prayer-btn-icon ' + cls + '">' + icon(p.icon, 22) + '</div>' +

        '<div class="prayer-btn-time">' + p.time + '</div>' +
        (st === true ? '<div class="prayer-btn-marker text-amber-300">' + icon('check', 12) + '</div>' : '') +
        (st === false ? '<div class="prayer-btn-marker text-red-400">' + icon('x', 12) + '</div>' : '') +
      '</button>';
    }).join('') + '</div>' +
    '<div class="text-xs text-slate-500 mt-3 italic">Tap to cycle: empty → done → missed → empty.</div>');

  // Workout
  const wo = day.workout;
  html += sectionWrap('sword', 'Combat Training', '+' + state.settings.points.workout.gain + ' / -' + state.settings.points.workout.loss,
    '<div class="toggle-grid">' +
      toggleBig(wo === true,  'app.setWorkout(true)',  '#22c55e', 'check', 'Trained') +
      toggleBig(wo === false, 'app.setWorkout(false)', '#ef4444', 'x',     'Skipped') +
      toggleBig(wo == null,   'app.setWorkout(null)',  '#64748b', null,    'Pending') +
    '</div>'
  );

  // Calories
  html += sectionWrap('apple', 'Nutrition Discipline', 'Limit: ' + state.settings.calorieLimit + ' kcal · +' + state.settings.points.calorie.gain + ' / -' + state.settings.points.calorie.loss,
    '<div class="space-y-3">' +
      '<input type="number" value="' + (day.calories || '') + '" oninput="app.setCalories(this.value)" placeholder="Enter calories consumed..." class="input lg mono" style="color:#fef3c7">' +
      '<div id="calorie-bar">' + calorieBarHtml(day.calories || 0) + '</div>' +
    '</div>'
  );

  // Work
  html += sectionWrap('briefcase', 'Productive Labor', state.settings.points.workHour + '/hr · ' + state.settings.points.workTask + '/task',
    '<div class="grid-2">' +
      '<div><label class="text-xs uppercase tracking-widest text-slate-400">Hours Worked</label>' +
        '<input type="number" min="0" step="0.5" value="' + (day.workHours || '') + '" oninput="app.setWorkHours(this.value)" placeholder="0" class="input mono mt-1" style="color:#e9d5ff"></div>' +
      '<div><label class="text-xs uppercase tracking-widest text-slate-400">Tasks Done</label>' +
        '<input type="number" min="0" value="' + (day.workTasks || '') + '" oninput="app.setWorkTasks(this.value)" placeholder="0" class="input mono mt-1" style="color:#e9d5ff"></div>' +
    '</div>'
  );

  // Custom
  const ch = state.settings.customHabits || [];
  let customInner;
  if (ch.length === 0) {
    customInner = '<div class="text-center text-slate-500 text-sm italic" style="padding:2rem 0">No personal disciplines yet. Forge your own path.</div>';
  } else {
    customInner = '<div class="space-y-3">' + ch.map(h => {
      const st = day.customHabits && day.customHabits[h.id];
      const bg = st === true ? 'background:rgba(16,185,129,0.1);color:#6ee7b7' :
                 st === false ? 'background:rgba(239,68,68,0.1);color:#fca5a5' :
                 'color:#cbd5e1';
      return '<div class="flex items-center gap-2" style="padding:0.5rem;border:1px solid #1e293b;border-radius:4px;background:rgba(2,6,23,0.4)">' +
        '<button class="flex-1" style="text-align:left;padding:0.5rem 0.75rem;border-radius:4px;' + bg + '" onclick="app.toggleCustom(\'' + h.id + '\')">' +
          '<span class="flex items-center gap-2">' +
            (st === true ? icon('check', 14) : st === false ? icon('x', 14) : '') +
            '<span>' + escapeHtml(h.name) + '</span>' +
          '</span>' +
        '</button>' +
        '<button onclick="app.removeCustom(\'' + h.id + '\')" style="padding:0.5rem;color:#475569" onmouseover="this.style.color=\'#f87171\'" onmouseout="this.style.color=\'#475569\'">' + icon('trash', 14) + '</button>' +
      '</div>';
    }).join('') + '</div>';
  }
  html += sectionWrap('sparkles', 'Personal Disciplines', '+' + state.settings.points.customHabit.gain + ' / -' + state.settings.points.customHabit.loss, customInner,
    '<button class="section-action" onclick="app.addCustom()">' + icon('plus', 12) + 'Add</button>');

  html += '</div>';
  return html;
}

function sectionWrap(ic, title, sub, body, action) {
  return '<div class="card">' +
    '<div class="section-head">' +
      '<div class="flex items-start gap-3">' +
        '<div class="section-icon">' + icon(ic, 16) + '</div>' +
        '<div><h3 class="section-title">' + escapeHtml(title) + '</h3>' +
        (sub ? '<div class="section-sub">' + escapeHtml(sub) + '</div>' : '') + '</div>' +
      '</div>' +
      (action || '') +
    '</div>' +
    body +
  '</div>';
}

function toggleBig(active, onclick, color, ic, label) {
  const style = active ? 'border-color:' + color + '60;background:' + color + '10;box-shadow:0 0 20px ' + color + '30, inset 0 0 20px ' + color + '10' : '';
  return '<button class="toggle-big' + (active ? ' active' : '') + '" style="' + style + '" onclick="' + onclick + '">' +
    (ic ? '<div class="toggle-big-icon" style="color:' + (active ? color : '#64748b') + '">' + icon(ic, 18) + '</div>' : '') +
    '<div class="toggle-big-label" style="color:' + (active ? color : '#64748b') + '">' + label + '</div>' +
  '</button>';
}

function calorieBarHtml(c) {
  if (c <= 0) return '';
  const lim = state.settings.calorieLimit;
  const over = c > lim;
  return '<div>' +
    '<div style="height:12px;border-radius:2px;background:#0f172a;overflow:hidden;border:1px solid #1e293b">' +
      '<div style="height:100%;width:' + Math.min(100, (c / lim) * 100) + '%;background:' + (over ? 'linear-gradient(90deg, #ef4444, #dc2626)' : 'linear-gradient(90deg, #06b6d4, #0891b2)') + ';box-shadow:' + (over ? '0 0 12px rgba(239,68,68,0.6)' : '0 0 12px rgba(6,182,212,0.6)') + ';transition:width 0.3s"></div>' +
    '</div>' +
    '<div class="flex justify-between text-xs mt-1">' +
      '<span style="color:' + (over ? '#f87171' : '#22d3ee') + '">' + c + ' / ' + lim + ' kcal</span>' +
      '<span class="text-slate-500">' + (over ? '+' + (c - lim) + ' over' : (lim - c) + ' remaining') + '</span>' +
    '</div>' +
  '</div>';
}

function renderCalorieBar() {
  const el = document.getElementById('calorie-bar');
  if (!el) return;
  const day = state.days[habitsDate] || {};
  el.innerHTML = calorieBarHtml(day.calories || 0);
}

function renderHabitsHeader() {

  el.style.textShadow = pts >= 0 ? '0 0 10px rgba(251,191,36,0.5)' : '0 0 10px rgba(239,68,68,0.5)';

          '<input type="date" value="' + diaryDate + '" oninput="app.setDiaryDate(this.value)" class="input mono" style="width:auto;padding:0.375rem 0.75rem;font-size:0.75rem">' +

        '<div class="search-wrap mb-3"><span class="search-icon">' + icon('search', 14) + '</span>' +
          '<input value="' + escapeHtml(diarySearch) + '" oninput="app.setDiarySearch(this.value)" placeholder="Search entries..." class="input search-input" style="font-size:0.875rem"></div>' +
        '<div id="diary-archive" class="scrollable">' + renderDiaryArchiveList() + '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderDiaryArchiveList() {
  const q = diarySearch.trim().toLowerCase();
  let entries = Object.entries(state.diary).filter(([_, v]) => v && v.trim()).sort((a, b) => b[0].localeCompare(a[0]));
  if (q) entries = entries.filter(([d, v]) => d.includes(q) || v.toLowerCase().includes(q));
  if (entries.length === 0) return '<div class="text-center text-sm text-slate-500 italic" style="padding:2rem 0">No entries yet.</div>';
  return entries.map(([d, v]) => {
    let prev = v;
    if (q) {
      const i = v.toLowerCase().indexOf(q);
      if (i >= 0) {
        const start = Math.max(0, i - 40);
        prev = (start > 0 ? '...' : '') + v.slice(start, i + q.length + 80) + '...';
      }
    } else {
      prev = v.slice(0, 200);
    }
    return '<button class="archive-item ' + (d === diaryDate ? 'active' : '') + '" onclick="app.setDiaryDate(\'' + d + '\')">' +
      '<div class="archive-date">' + escapeHtml(fmtDate(d)) + '</div>' +
      '<div class="archive-preview">' + escapeHtml(prev) + '</div>' +
    '</button>';
  }).join('');
}

function renderDiaryArchive() {
  const el = document.getElementById('diary-archive');
  if (el) el.innerHTML = renderDiaryArchiveList();
}

// ----- Goals -----
function renderGoals() {
  const cur = new Date().getFullYear();
  let yrs = Array.from(new Set(state.goals.map(g => g.year))).sort((a, b) => b - a);
  if (!yrs.includes(cur)) yrs.unshift(cur);
  if (!yrs.includes(cur + 1)) yrs.push(cur + 1);
  const yearGoals = state.goals.filter(g => g.year === goalsYear);

  let html = '<div class="space-y-6 anim-fade-in">';
  html +=
    '<div class="flex" style="flex-direction:column;gap:1rem">' +
      '<div style="flex:1"><h1 class="font-display text-3xl font-black tracking-wide text-amber-100" style="font-size:2.25rem">Yearly Quests</h1>' +
      '<p class="text-slate-400 text-sm mt-1">Each milestone grants +' + state.settings.points.milestone + ' PWR upon completion.</p></div>' +
      '<select onchange="app.setGoalsYear(this.value)" class="select" style="width:auto;padding:0.5rem 0.75rem">' +
        yrs.map(y => '<option value="' + y + '"' + (y === goalsYear ? ' selected' : '') + ' style="background:#020617">' + y + '</option>').join('') +
      '</select>' +
    '</div>';

  html +=
    '<div class="card">' +
      '<form class="flex gap-2" onsubmit="event.preventDefault();var i=this.querySelector(\'input\');app.addGoal(i.value);i.value=\'\'">' +
        '<input class="input flex-1" placeholder="Forge a new quest for ' + goalsYear + '...">' +
        '<button class="btn btn-amber" type="submit">' + icon('plus', 14) + 'Forge</button>' +
      '</form>' +
    '</div>';

  if (yearGoals.length === 0) {
    html += '<div class="text-center text-slate-500 italic" style="padding:3rem 0">No quests for ' + goalsYear + '. The path awaits.</div>';
  } else {
    html += '<div class="space-y-4">' + yearGoals.map(g => {
      const done = g.milestones.filter(m => m.done).length;
      const pct = g.milestones.length ? (done / g.milestones.length) * 100 : 0;
      const pctColor = pct >= 100 ? '#22c55e' : '#a855f7';
      const fillBg = pct >= 100 ? 'linear-gradient(90deg, #22c55e, #10b981)' : 'linear-gradient(90deg, #a855f7, #ec4899)';
      return '<div class="card goal-card">' +
        '<div class="goal-head">' +
          '<div style="flex:1">' +
            '<h3 class="goal-title">' + escapeHtml(g.title) + '</h3>' +
            '<div class="goal-meta">' + done + ' of ' + g.milestones.length + ' milestones · +' + (done * state.settings.points.milestone) + ' PWR earned</div>' +
          '</div>' +
          '<div class="text-right"><div class="goal-pct" style="color:' + pctColor + '">' + pct.toFixed(0) + '%</div></div>' +
        '</div>' +
        '<div style="height:8px;background:#0f172a;border-radius:2px;overflow:hidden;margin-bottom:1rem"><div style="height:100%;width:' + pct + '%;background:' + fillBg + ';box-shadow:0 0 10px ' + (pct >= 100 ? 'rgba(34,197,94,0.6)' : 'rgba(168,85,247,0.6)') + ';transition:width 0.5s"></div></div>' +
        '<div class="space-y-1 mb-3">' + g.milestones.map(m =>
          '<div class="milestone-row">' +
            '<button class="milestone-check ' + (m.done ? 'done' : '') + '" onclick="app.toggleMilestone(\'' + g.id + '\',\'' + m.id + '\')">' + (m.done ? icon('check', 12) : '') + '</button>' +
            '<span class="milestone-text ' + (m.done ? 'done' : '') + '">' + escapeHtml(m.title) + '</span>' +
            '<button class="ms-del" onclick="app.removeMilestone(\'' + g.id + '\',\'' + m.id + '\')" style="color:#475569">' + icon('x', 14) + '</button>' +
          '</div>'
        ).join('') + '</div>' +
        '<div class="flex gap-2">' +
          '<button class="text-xs uppercase tracking-widest text-amber-300 flex items-center gap-1" onclick="app.addMilestone(\'' + g.id + '\')">' + icon('plus', 12) + 'Milestone</button>' +
          '<div style="flex:1"></div>' +
          '<button class="text-xs uppercase tracking-widest text-slate-500 flex items-center gap-1" onclick="app.removeGoal(\'' + g.id + '\')" onmouseover="this.style.color=\'#f87171\'" onmouseout="this.style.color=\'#64748b\'">' + icon('trash', 12) + 'Delete</button>' +
        '</div>' +
      '</div>';
    }).join('') + '</div>';
  }
  html += '</div>';
  return html;
}

          '<div class="notes-folder-actions">' +
            '<button onclick="app.renameFolder(\'' + f.id + '\')">' + icon('edit', 11) + '</button>' +
            '<button onclick="app.removeFolder(\'' + f.id + '\')">' + icon('trash', 11) + '</button>' +
          '</div>' +
        '</div>'
      ).join('') + '</div>';

    // Notes list
    html += '<div class="card col-span-3" style="padding:0.75rem;display:flex;flex-direction:column">' +
      '<div class="flex items-center gap-2 mb-2">' +
        '<div class="search-wrap" style="flex:1"><span class="search-icon" style="left:0.5rem">' + icon('search', 12) + '</span>' +
        '<input value="' + escapeHtml(noteSearch) + '" oninput="app.setNoteSearch(this.value)" placeholder="Search..." class="input search-input" style="padding:0.375rem 0.5rem 0.375rem 1.75rem;font-size:0.75rem"></div>' +
        '<button onclick="app.addNote()" ' + (folder ? '' : 'disabled') + ' class="btn btn-amber" style="padding:0.375rem">' + icon('plus', 12) + '</button>' +
      '</div>' +
      '<div id="notes-list" class="scrollable">' + renderNotesListInner(folder) + '</div>' +
    '</div>';

    // Editor
    html += '<div class="card col-span-6">';
    if (note) {
      html += '<div class="flex flex-col" style="min-height:30rem">' +
        '<div class="flex items-center gap-2 mb-3">' +
          '<input value="' + escapeHtml(note.title) + '" oninput="app.setNoteTitle(this.value)" style="flex:1;border-bottom:1px solid #1e293b;padding:0.25rem;font-family:Cinzel,serif;font-size:1.125rem;font-weight:700;color:#fef3c7;background:transparent;border-radius:0">' +
          '<button onclick="app.removeNote(\'' + note.id + '\')" style="padding:0.5rem;color:#64748b">' + icon('trash', 14) + '</button>' +
        '</div>' +
        '<textarea oninput="app.setNoteContent(this.value)" placeholder="Inscribe your knowledge..." style="flex:1;border:1px solid #1e293b;border-radius:4px;padding:0.75rem;color:#e2e8f0;background:transparent;resize:none;font-family:Rajdhani,sans-serif;font-size:14px;min-height:25rem;line-height:1.6">' + escapeHtml(note.content) + '</textarea>' +
        '<div style="font-size:10px;color:#475569;margin-top:0.5rem;font-family:JetBrains Mono,monospace;text-align:right">Updated ' + new Date(note.updated).toLocaleString() + '</div>' +
      '</div>';
    } else {
      html += '<div class="flex items-center justify-center text-slate-500 italic text-sm" style="min-height:30rem">' + (folder ? 'Select or create a note.' : 'Select a realm.') + '</div>';
    }
    html += '</div>';

    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderNotesListInner(folder) {
  if (!folder) return '<div class="text-xs text-slate-500 italic text-center" style="padding:1.5rem 0">No notes</div>';
  const q = noteSearch.trim().toLowerCase();
  let notes = folder.notes.slice().sort((a, b) => b.updated - a.updated);
  if (q) notes = notes.filter(n => n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q));
  if (notes.length === 0) return '<div class="text-xs text-slate-500 italic text-center" style="padding:1.5rem 0">No notes</div>';
  return notes.map(n =>
    '<button class="note-item ' + (activeNoteId === n.id ? 'active' : '') + '" onclick="app.selectNote(\'' + n.id + '\')">' +
      '<div class="note-item-title"><span style="color:#64748b">' + icon('file', 11) + '</span>' + escapeHtml(n.title || 'Untitled') + '</div>' +
      '<div class="note-item-preview">' + escapeHtml((n.content || 'Empty...').slice(0, 80)) + '</div>' +
    '</button>'
  ).join('');
}

function renderNotesList() {
  const el = document.getElementById('notes-list');
  if (!el) return;
  const folder = state.folders.find(f => f.id === activeFolderId);
  el.innerHTML = renderNotesListInner(folder);
}

// ----- Settings -----
function renderSettings() {
  const s = state.settings;
  function field(label, path, val, suffix) {
    return '<div><label class="text-xs uppercase tracking-widest text-slate-400">' + label + '</label>' +
      '<div class="flex mt-1"><input type="number" value="' + val + '" oninput="app.setSettingNum(\'' + path + '\', this.value)" class="input mono" style="border-top-right-radius:' + (suffix ? '0' : '4px') + ';border-bottom-right-radius:' + (suffix ? '0' : '4px') + ';color:#fde68a">' +
      (suffix ? '<span style="padding:0.5rem 0.75rem;background:#0f172a;border:1px solid #334155;border-left:0;border-top-right-radius:4px;border-bottom-right-radius:4px;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.15em;color:#64748b;display:flex;align-items:center">' + suffix + '</span>' : '') +
      '</div></div>';
  }

  return '<div class="space-y-6 anim-fade-in" style="max-width:48rem">' +
    '<div><h1 class="font-display text-3xl font-black tracking-wide text-amber-100" style="font-size:2.25rem">The Forge</h1>' +
    '<p class="text-slate-400 text-sm mt-1">Calibrate the system to your path.</p></div>' +

    '<div class="card space-y-4">' +
      '<h2 class="font-display tracking-widest uppercase text-amber-100 font-bold flex items-center gap-2"><span class="text-amber-300">' + icon('apple', 16) + '</span>Nutrition Limit</h2>' +
      field('Daily Calorie Limit', 'calorieLimit', s.calorieLimit, 'kcal') +
    '</div>' +

    '<div class="card space-y-4">' +
      '<h2 class="font-display tracking-widest uppercase text-amber-100 font-bold flex items-center gap-2"><span class="text-amber-300">' + icon('zap', 16) + '</span>Power Values</h2>' +
      '<div class="grid-2">' +
        field('Prayer · Gain', 'points.prayer.gain', s.points.prayer.gain) +
        field('Prayer · Loss', 'points.prayer.loss', s.points.prayer.loss) +
        field('Workout · Gain', 'points.workout.gain', s.points.workout.gain) +
        field('Workout · Loss', 'points.workout.loss', s.points.workout.loss) +
        field('Calorie · Within', 'points.calorie.gain', s.points.calorie.gain) +
        field('Calorie · Over', 'points.calorie.loss', s.points.calorie.loss) +
        field('Per Work Hour', 'points.workHour', s.points.workHour) +
        field('Per Task', 'points.workTask', s.points.workTask) +
        field('Custom Habit · Gain', 'points.customHabit.gain', s.points.customHabit.gain) +
        field('Custom Habit · Loss', 'points.customHabit.loss', s.points.customHabit.loss) +
        field('Goal Milestone Bonus', 'points.milestone', s.points.milestone) +
      '</div>' +
    '</div>' +

    '<div class="card space-y-3">' +
      '<h2 class="font-display tracking-widest uppercase text-amber-100 font-bold flex items-center gap-2"><span class="text-amber-300">' + icon('shield', 16) + '</span>Data Management</h2>' +
      '<div class="flex" style="flex-wrap:wrap;gap:0.5rem">' +
        '<button class="btn btn-cyan" onclick="app.exportData()">' + icon('download', 12) + 'Export</button>' +
        '<button class="btn btn-red" onclick="app.resetAll()">' + icon('refresh', 12) + 'Reset All</button>' +
      '</div>' +
      '<p class="text-xs text-slate-500 italic">Your data syncs to Supabase. Export creates a local backup.</p>' +
    '</div>' +
  '</div>';
}

// ----- Modal -----
function renderModal() {
  const root = document.getElementById('modal-root');
  if (!levelUpRank) { root.innerHTML = ''; return; }
  const r = levelUpRank;
  const sparks = Array.from({length: 40}, (_, i) => {
    const left = Math.random()*100, top = 50 + Math.random()*30;
    const dur = (1 + Math.random()*1.5).toFixed(2);
    const delay = (Math.random()*0.5).toFixed(2);
    return '<div class="spark" style="left:' + left + '%;top:' + top + '%;background:' + r.color + ';box-shadow:0 0 8px ' + r.glow + ';animation:spark ' + dur + 's ease-out ' + delay + 's infinite"></div>';
  }).join('');
  root.innerHTML =
    '<div class="modal-backdrop" onclick="app.closeLevelUp()">' +
      '<div class="modal-sparks">' + sparks + '</div>' +
      '<div class="modal-content" onclick="event.stopPropagation()">' +
        '<div class="modal-aura" style="background:radial-gradient(circle, ' + r.aura + ' 0%, transparent 60%)"></div>' +
        '<div class="modal-relative">' +
          '<div class="modal-pre">Power Level Increased</div>' +
          '<div class="modal-title" style="color:' + r.color + ';text-shadow:0 0 30px ' + r.glow + ', 0 0 60px ' + r.aura + '">ASCENSION</div>' +
          '<div class="modal-rank" style="color:' + r.color + '">' + escapeHtml(r.name) + '</div>' +
          '<div class="modal-desc">"' + escapeHtml(r.desc) + '"</div>' +
          '<button class="modal-btn" style="border-color:' + r.color + ';color:' + r.color + '" onclick="app.closeLevelUp()">Embrace Power</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

// ============= INIT =============
(async function() {
  try {
    const s = await sbLoad();
    if (s) {
      state.days = s.days || {};
      state.diary = s.diary || {};
      state.goals = s.goals || [];
      state.folders = s.folders || [];
      state.settings = Object.assign({}, DEFAULT_SETTINGS, s.settings || {}, {
        points: Object.assign({}, DEFAULT_SETTINGS.points, (s.settings && s.settings.points) || {})
      });
    }
    syncStatus = "synced";
  } catch (e) {
    console.error("Initial load:", e);
    syncStatus = "error";
  }
  prevRankIdx = getActiveRank().index;
  document.getElementById('loading-screen').remove();
  document.getElementById('app').hidden = false;
  renderHeader();
  renderSyncBadge();
  renderNav();
  renderView();
})();
</script>
</body>
